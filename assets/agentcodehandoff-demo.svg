<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="980" fill="#07111A"/>
  <rect x="70" y="70" width="1460" height="840" rx="26" fill="#0B1621" stroke="#214155" stroke-width="2"/>
  <rect x="70" y="70" width="1460" height="56" rx="26" fill="#0D1C29"/>
  <circle cx="112" cy="98" r="8" fill="#FF6B6B"/>
  <circle cx="138" cy="98" r="8" fill="#FFD166"/>
  <circle cx="164" cy="98" r="8" fill="#4CC38A"/>
  <text x="800" y="105" text-anchor="middle" fill="#E7F6FF" font-family="Menlo, Monaco, monospace" font-size="26">AgentCodeHandoff • terminal demo</text>

  <text x="110" y="170" fill="#87A8BC" font-family="Menlo, Monaco, monospace" font-size="24">$ agentcodehandoff quickstart --repo /path/to/repo</text>
  <text x="110" y="220" fill="#79F2C8" font-family="Menlo, Monaco, monospace" font-size="24">home: ~/.agentcodehandoff</text>
  <text x="110" y="258" fill="#79F2C8" font-family="Menlo, Monaco, monospace" font-size="24">OK    codex CLI ready</text>
  <text x="110" y="296" fill="#79F2C8" font-family="Menlo, Monaco, monospace" font-size="24">OK    hermes CLI ready</text>
  <text x="110" y="334" fill="#79F2C8" font-family="Menlo, Monaco, monospace" font-size="24">OK    claude CLI ready</text>
  <text x="110" y="372" fill="#79F2C8" font-family="Menlo, Monaco, monospace" font-size="24">OK    openclaw CLI ready</text>
  <text x="110" y="420" fill="#9CEBFF" font-family="Menlo, Monaco, monospace" font-size="24">started codex bridge</text>
  <text x="110" y="458" fill="#9CEBFF" font-family="Menlo, Monaco, monospace" font-size="24">started hermes bridge</text>
  <text x="110" y="496" fill="#9CEBFF" font-family="Menlo, Monaco, monospace" font-size="24">started claude bridge</text>

  <rect x="860" y="170" width="570" height="280" rx="20" fill="#0C1A27" stroke="#2E566E" stroke-width="2"/>
  <text x="895" y="215" fill="#E7F6FF" font-family="Menlo, Monaco, monospace" font-size="24">ops dashboard</text>
  <text x="895" y="260" fill="#7EE6FF" font-family="Menlo, Monaco, monospace" font-size="22">codex: healthy</text>
  <text x="895" y="295" fill="#7EE6FF" font-family="Menlo, Monaco, monospace" font-size="22">hermes: healthy</text>
  <text x="895" y="330" fill="#7EE6FF" font-family="Menlo, Monaco, monospace" font-size="22">claude: healthy</text>
  <text x="895" y="365" fill="#BFD6E3" font-family="Menlo, Monaco, monospace" font-size="20">requests: 1 pending</text>
  <text x="895" y="400" fill="#BFD6E3" font-family="Menlo, Monaco, monospace" font-size="20">availability: all auto</text>

  <text x="110" y="610" fill="#87A8BC" font-family="Menlo, Monaco, monospace" font-size="24">$ agentcodehandoff request --from-agent codex --to-agent hermes \</text>
  <text x="150" y="646" fill="#87A8BC" font-family="Menlo, Monaco, monospace" font-size="24">--summary "Need help" --details "Reply automatically" --files README.md</text>
  <text x="110" y="700" fill="#FFD58A" font-family="Menlo, Monaco, monospace" font-size="24">[21:54:43] codex -&gt; hermes</text>
  <text x="110" y="736" fill="#E7F6FF" font-family="Menlo, Monaco, monospace" font-size="24">summary: Need help</text>
  <text x="110" y="786" fill="#7EF7BD" font-family="Menlo, Monaco, monospace" font-size="24">[21:54:58] hermes -&gt; codex</text>
  <text x="110" y="822" fill="#E7F6FF" font-family="Menlo, Monaco, monospace" font-size="24">summary: Acknowledged request</text>
  <text x="110" y="858" fill="#BFD6E3" font-family="Menlo, Monaco, monospace" font-size="22">details: README.md received, live bridge path verified</text>

  <text x="800" y="945" text-anchor="middle" fill="#8FB0C2" font-family="Menlo, Monaco, monospace" font-size="22">Local-first • bring-your-own-agent • no hosted harness required</text>
</svg>
