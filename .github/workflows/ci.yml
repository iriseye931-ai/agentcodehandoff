name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        run: python3 -m py_compile src/agentcodehandoff/cli.py tests/test_cli.py

      - name: Run test suite
        run: python3 -m unittest discover -s tests -v
